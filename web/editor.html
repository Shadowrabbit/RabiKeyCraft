<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyCraft Editor - 键帽设计器</title>
  <link rel="stylesheet" href="./editor.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.183.2/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.183.2/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <!-- ========== 顶部工具栏 ========== -->
    <div class="toolbar">
      <a class="toolbar-logo" href="./index.html">⌨ KeyCraft</a>
      <div class="toolbar-sep"></div>

      <!-- 布局 -->
      <div class="toolbar-group">
        <span class="toolbar-label">布局</span>
        <select class="toolbar-select" v-model="currentLayout" @change="onLayoutChange">
          <option v-for="(lay, key) in layouts" :key="key" :value="key">{{ lay.name }}</option>
        </select>
      </div>

      <!-- 轮廓 -->
      <div class="toolbar-group">
        <span class="toolbar-label">轮廓</span>
        <div class="profile-switch">
          <button class="profile-btn" :class="{ active: keycapProfile === 'cherry' }" @click="keycapProfile='cherry'; onProfileChange()">Cherry</button>
          <button class="profile-btn" :class="{ active: keycapProfile === 'oem' }" @click="keycapProfile='oem'; onProfileChange()">OEM</button>
          <button class="profile-btn" :class="{ active: keycapProfile === 'sa' }" @click="keycapProfile='sa'; onProfileChange()">SA</button>
          <button class="profile-btn" :class="{ active: keycapProfile === 'dsa' }" @click="keycapProfile='dsa'; onProfileChange()">DSA</button>
          <button class="profile-btn" :class="{ active: keycapProfile === 'xda' }" @click="keycapProfile='xda'; onProfileChange()">XDA</button>
          <button class="profile-btn" :class="{ active: keycapProfile === 'moa' }" @click="keycapProfile='moa'; onProfileChange()">MOA</button>
        </div>
      </div>

      <!-- 材质 -->
      <div class="toolbar-group">
        <span class="toolbar-label">材质</span>
        <select class="toolbar-select toolbar-select-sm" v-model="keycapMaterial" @change="onMaterialChange">
          <option value="pbt">PBT 哑光</option>
          <option value="abs">ABS 光滑</option>
          <option value="translucent">半透明</option>
          <option value="metal">金属涂层</option>
        </select>
      </div>

      <div class="toolbar-spacer"></div>

      <button class="toolbar-btn toolbar-btn-ghost" @click="resetView">重置视角</button>
      <button class="toolbar-btn toolbar-btn-primary" @click="exportPNG">导出 PNG</button>
    </div>

    <!-- ========== 主体 ========== -->
    <div class="editor-body">

      <!-- 左面板 -->
      <div class="left-panel">
        <!-- ===== 底色设计 ===== -->
        <div class="panel-section">
          <div class="panel-title">底色设计</div>
          <!-- 全键底色 -->
          <div class="global-color-row">
            <div class="global-color-item">
              <span class="global-color-label">全键底色</span>
              <div class="zone-swatch" :style="{background: zoneColors.alpha?.base || '#3c3c3c'}" title="底色">
                <input type="color" :value="zoneColors.alpha?.base || '#3c3c3c'"
                  @input="applyGlobalBase($event.target.value)" />
              </div>
            </div>
            <button class="zone-action-btn-sm" @click="resetZoneColors" title="恢复默认">↺</button>
          </div>
          <!-- 分区覆盖（可折叠） -->
          <div class="zone-toggle-row" @click="showZoneOverride = !showZoneOverride">
            <span class="zone-toggle-text">分区覆盖</span>
            <span class="zone-toggle-arrow" :class="{ open: showZoneOverride }">▶</span>
          </div>
          <template v-if="showZoneOverride">
            <div class="zone-list">
              <div class="zone-row" v-for="(gname, gkey) in groupNames" :key="gkey">
                <span class="zone-name">{{ gname }}</span>
                <div class="zone-colors">
                  <button class="zone-cp-btn" @click="copyZoneColor(gkey)" title="复制">📋</button>
                  <button class="zone-cp-btn" @click="pasteZoneColor(gkey)" title="粘贴" :disabled="!clipboard">📌</button>
                  <div class="zone-swatch" :style="{background: zoneColors[gkey]?.base || '#3c3c3c'}" title="底色">
                    <input type="color" :value="zoneColors[gkey]?.base || '#3c3c3c'"
                      @input="setZoneBase(gkey, $event.target.value)" />
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- ===== 图案图层 ===== -->
        <div class="panel-section layer-section">
          <div class="panel-title layer-title-row">
            <span>图案图层</span>
            <button class="layer-add-btn" @click="addLayer" title="添加图层">+</button>
          </div>

          <div class="layer-list">
            <div v-for="(layer, idx) in layers" :key="layer.id"
              class="layer-card" :class="{ active: activeLayerIdx === idx }"
              @click="selectLayer(idx)">
              <div class="layer-thumb">
                <img v-if="layer.imageUrl" :src="layer.imageUrl" />
                <span v-else class="layer-empty-icon">🖼</span>
              </div>
              <div class="layer-info">
                <div class="layer-name">{{ layer.name }}</div>
                <div class="layer-meta">
                  <span v-if="layer.image">{{ Math.round(layer.opacity * 100) }}%</span>
                  <span v-else class="layer-no-img">未上传</span>
                </div>
              </div>
              <div class="layer-actions">
                <button class="layer-act-btn" @click.stop="toggleLayerVisible(idx)"
                  :title="layer.visible ? '隐藏' : '显示'">
                  {{ layer.visible ? '👁' : '🚫' }}
                </button>
                <button class="layer-act-btn" @click.stop="moveLayer(idx, -1)" title="上移"
                  :disabled="idx === 0">↑</button>
                <button class="layer-act-btn" @click.stop="moveLayer(idx, 1)" title="下移"
                  :disabled="idx === layers.length - 1">↓</button>
                <button class="layer-act-btn danger" @click.stop="removeLayer(idx)" title="删除">✕</button>
              </div>
            </div>
            <div v-if="layers.length === 0" class="layer-empty-hint">
              点击 + 添加图层，上传图片覆盖键帽
            </div>
          </div>
        </div>

        <!-- 活跃图层设置 -->
        <template v-if="activeLayer">
          <div class="panel-section simple-panel">
            <div class="panel-title">{{ activeLayer.name }} — 图片</div>
            <div v-if="!activeLayer.image" class="upload-area"
              @click="$refs.fileInput.click()"
              @dragover.prevent="dragOver = true"
              @dragleave="dragOver = false"
              @drop.prevent="onDrop"
              :class="{ dragging: dragOver }">
              <div class="upload-icon">🖼</div>
              <div class="upload-text">点击或拖拽图片</div>
              <div class="upload-hint">JPG / PNG / WebP</div>
              <input ref="fileInput" class="upload-input" type="file" accept="image/*" @change="onFileSelect" />
            </div>
            <div v-else class="image-preview">
              <img :src="activeLayer.imageUrl" />
              <button class="image-clear" @click="clearLayerImage">✕</button>
            </div>
          </div>

          <div v-if="activeLayer.image" class="panel-section simple-panel">
            <div class="panel-title">位置与透明度</div>
            <div class="slider-group">
              <div class="slider-row">
                <span class="slider-label">X 偏移</span>
                <input type="range" min="0" max="1" step="0.01"
                  v-model.number="activeLayer.offsetX" @input="onLayerUpdate" />
                <span class="slider-value">{{ (activeLayer.offsetX * 100).toFixed(0) }}%</span>
              </div>
              <div class="slider-row">
                <span class="slider-label">Y 偏移</span>
                <input type="range" min="0" max="1" step="0.01"
                  v-model.number="activeLayer.offsetY" @input="onLayerUpdate" />
                <span class="slider-value">{{ (activeLayer.offsetY * 100).toFixed(0) }}%</span>
              </div>
              <div class="slider-row">
                <span class="slider-label">缩放</span>
                <input type="range" min="0.3" max="3" step="0.05"
                  v-model.number="activeLayer.scale" @input="onLayerUpdate" />
                <span class="slider-value">{{ activeLayer.scale.toFixed(2) }}x</span>
              </div>
              <div class="slider-row">
                <span class="slider-label">不透明</span>
                <input type="range" min="0" max="1" step="0.05"
                  v-model.number="activeLayer.opacity" @input="onLayerUpdate" />
                <span class="slider-value">{{ (activeLayer.opacity * 100).toFixed(0) }}%</span>
              </div>
            </div>
            <button class="simple-reset-btn" @click="resetLayerPos">↺ 重置位置</button>
          </div>
        </template>

        <!-- 显示选项 -->
        <div v-if="hasAnyImage" class="panel-section simple-panel">
          <div class="panel-title">显示选项</div>
          <div class="toggle-row">
            <span class="toggle-label">显示按键文字</span>
            <label class="toggle-switch">
              <input type="checkbox" v-model="showLegend" @change="onToggleLegend" />
              <span class="toggle-track"></span>
            </label>
          </div>
        </div>

        <!-- 键盘外壳 -->
        <div class="panel-section case-section">
          <div class="panel-title">键盘外壳</div>
          <div class="case-row">
            <span class="case-label">颜色</span>
            <div class="case-color-swatch" :style="{ background: caseColor }">
              <input type="color" :value="caseColor" @input="caseColor = $event.target.value; onCaseColorChange()" />
            </div>
            <input class="case-color-hex" :value="caseColor" @change="caseColor = $event.target.value; onCaseColorChange()" />
          </div>
          <div class="case-row">
            <span class="case-label">材质</span>
            <div class="case-mat-switch">
              <button class="case-mat-btn" :class="{ active: caseMaterial === 'plastic' }" @click="caseMaterial='plastic'; onCaseMaterialChange()">塑料</button>
              <button class="case-mat-btn" :class="{ active: caseMaterial === 'metal' }" @click="caseMaterial='metal'; onCaseMaterialChange()">金属</button>
            </div>
          </div>
        </div>
      </div><!-- /left-panel -->

      <!-- 3D 视口 -->
      <div class="viewport" ref="viewport">
        <span class="viewport-hint">左键旋转 · 右键平移 · 滚轮缩放 · 点击键帽查看</span>
      </div>

      <!-- 右面板（键帽信息） -->
      <div class="right-panel" :class="{ collapsed: !selectedKey }">
        <template v-if="selectedKey">
          <div class="prop-header">
            <div>
              <div class="prop-key-name">{{ selectedDef.label || selectedDef.id }}</div>
              <div class="prop-key-id">{{ selectedDef.id }} · {{ groupNames[selectedDef.group] }}</div>
            </div>
            <button class="prop-close" @click="onDeselectKey">✕</button>
          </div>

          <div class="prop-field">
            <div class="prop-field-label">当前底色</div>
            <div class="prop-color-row">
              <div class="prop-color-swatch" :style="{ background: propBase }"></div>
              <span class="prop-color-text">{{ propBase }}</span>
            </div>
          </div>
          <div class="prop-field">
            <div class="prop-field-label">当前文字色</div>
            <div class="prop-color-row">
              <div class="prop-color-swatch" :style="{ background: propLegend }"></div>
              <span class="prop-color-text">{{ propLegend }}</span>
            </div>
          </div>
          <div class="prop-field">
            <div class="prop-field-label">键位尺寸</div>
            <span class="prop-info-text">{{ selectedDef.w || 1 }}u × {{ selectedDef.h || 1 }}u</span>
          </div>
          <div class="prop-field">
            <div class="prop-field-label">所属行</div>
            <span class="prop-info-text">R{{ selectedDef.row || 3 }}</span>
          </div>

          <div class="prop-wip-box">
            <div class="prop-wip-icon">🔧</div>
            <div class="prop-wip-text">单键详细设计<br/><small>（开发中，敬请期待）</small></div>
          </div>
        </template>
      </div>

    </div><!-- /editor-body -->
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script type="module" src="./editor.js"></script>
</body>
</html>
